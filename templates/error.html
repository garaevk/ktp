{% extends "base.html" %}
{% block title %}Ошибка{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5 text-center">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#dc3545" stroke-width="1.5" class="mb-3">
                    <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <h4 class="fw-bold mb-2">Произошла ошибка</h4>
                <p class="text-muted mb-4">{{ message }}</p>
                <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-4">
                    На главную
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
