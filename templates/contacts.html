{% extends "base.html" %}
{% block title %}КТП-генератор — Контакты{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-4 p-lg-5">
                <h4 class="card-title fw-bold mb-4">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="me-1"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    Контакты
                </h4>

                <div class="d-flex align-items-center gap-3 p-3 bg-light rounded-3 mb-3">
                    <div class="d-flex align-items-center justify-content-center rounded-circle bg-primary text-white" style="width: 48px; height: 48px; flex-shrink: 0;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </div>
                    <div>
                        <div class="text-muted small">Электронная почта</div>
                        <a href="mailto:ksosh@yandex.ru" class="text-decoration-none fw-semibold fs-6">ksosh@yandex.ru</a>
                    </div>
                </div>

                <hr class="my-4">

                <div class="text-center">
                    <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-4">
                        ← Вернуться к генератору
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
